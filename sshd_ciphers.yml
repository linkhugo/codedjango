---
# Playbook: sshd_ciphers.yml
#
# Actualiza los algoritmos criptográficos del SSHD en dispositivos F5 BIG-IP.
# Referencia: F5 KB K49586523
#
# IMPORTANTE: Solo aplica a equipos en estado Failover ACTIVE.
# Los equipos en standby se omiten sin marcar error.
#
# Uso:
#   ansible-playbook sshd_ciphers.yml --ask-vault-pass
#   ansible-playbook sshd_ciphers.yml -l lb01 --ask-vault-pass
#
# Credenciales en vault (inventory/group_vars/f5_devices.vault.yml):
#   ansible_user, ansible_password

- hosts: f5_devices
  gather_facts: false
  vars:
    # ── SSH crypto (KB K49586523) ─────────────────────────────────────────────
    sshd_ciphers: >-
      aes128-gcm@openssh.com,aes256-gcm@openssh.com,aes128-ctr,
      aes192-ctr,aes256-ctr,chacha20-poly1305@openssh.com
    sshd_macs: >-
      hmac-sha2-256-etm@openssh.com,hmac-sha2-512-etm@openssh.com,
      umac-128-etm@openssh.com
    sshd_kex: >-
      diffie-hellman-group18-sha512,diffie-hellman-group14-sha256,
      curve25519-sha256@libssh.org,diffie-hellman-group16-sha512
    sshd_hostkeyalgorithms: >-
      ssh-rsa,rsa-sha2-512,rsa-sha2-256,ssh-ed25519

  tasks:

    - name: "Bloque principal con cleanup de token"
      block:

        - name: "Obtener token iControlREST"
          ansible.builtin.include_tasks: tasks/f5_get_token.yml

        - name: "Consultar estado de failover"
          ansible.builtin.include_tasks: tasks/f5_get_failover_status.yml

        - name: "Omitir equipo en standby: {{ inventory_hostname }} ({{ failover }})"
          ansible.builtin.meta: end_host
          when: failover != 'active'

        - name: "Actualizar algoritmos SSHD en {{ inventory_hostname }}"
          ansible.builtin.uri:
            url: "https://{{ ansible_host }}:{{ f5_api_port }}/mgmt/tm/sys/sshd"
            method: PATCH
            headers:
              X-F5-Auth-Token: "{{ f5_api_token }}"
            body_format: json
            body:
              include: |
                Ciphers {{ sshd_ciphers | replace('\n', '') | replace(' ', '') }}
                MACs {{ sshd_macs | replace('\n', '') | replace(' ', '') }}
                KexAlgorithms {{ sshd_kex | replace('\n', '') | replace(' ', '') }}
                HostKeyAlgorithms {{ sshd_hostkeyalgorithms | replace('\n', '') | replace(' ', '') }}
            validate_certs: "{{ f5_validate_certs }}"
            status_code: 200
            timeout: 30
          delegate_to: localhost
          register: _sshd_patch

        - name: "Confirmar aplicación en {{ inventory_hostname }}"
          ansible.builtin.debug:
            msg: "SSHD actualizado correctamente (failover: {{ failover }})"

      always:

        - name: "Revocar token iControlREST"
          ansible.builtin.include_tasks: tasks/f5_revoke_token.yml
