---
# Envía un registro de host no alcanzable a la API REST de Django.
# Se invoca desde healthcheck_f5.yml cuando lb_api_push == true y host_ok == false.
#
# Requiere (facts del playbook):
#   _lb_api_token → token JWT compartido (obtenido una sola vez en healthcheck_f5.yml)

- name: "Enviar host unreachable {{ inventory_hostname }} a la API REST"
  ansible.builtin.uri:
    url: "{{ lb_api_url }}/api/v1/health/f5/"
    method: POST
    body_format: json
    body:
      fqdn:             "{{ inventory_hostname }}"
      uptime:           0
      failover:         "unreachable"
      failsafe:         null
      sync:             null
      ltm_logs:         0
      cpu_usage:        0
      cpu_plane_use:    0
      cpu_analysis_use: 0
      top_connections:  0
      tmm_memory:       0
      tmm_memory_used:  0
      nodes:            0
      nodes_up:         0
      nodes_down:       0
      nodes_user_down:  0
      vips:             0
      vips_up:          0
      vips_offline:     0
      vips_unknown:     0
      fecha:            "{{ lookup('pipe', 'TZ=America/Mexico_City date +%Y-%m-%d') }}"
      company:          "{{ company | default(None) }}"
      last_folder:      null
      file_backup:      null
      backup_path:      "{{ backup_path | default(None) }}"
    headers:
      Authorization: "Bearer {{ _lb_api_token }}"
    status_code: [200, 201]
    timeout: 30
  delegate_to: localhost
  ignore_errors: true
