---
# Obtiene un token iControlREST y extiende su timeout.
# El token se almacena en f5_api_token (hecho de host).
#
# Requiere:
#   - ansible_host      : IP o FQDN del BIG-IP
#   - f5_api_port       : puerto HTTPS (default 443)
#   - f5_auth_provider  : proveedor de auth (default "tmos")
#   - f5_validate_certs : validación TLS (default false)
#   - f5_token_timeout  : segundos de vida del token (default 3600)
#   - lb_user / lb_pass : credenciales (desde vault)
#
# Publica:
#   - f5_api_token : token activo para el resto de las tareas

- name: "Autenticar en iControlREST y obtener token para {{ inventory_hostname }}"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ f5_api_port }}/mgmt/shared/authn/login"
    method: POST
    body_format: json
    body:
      username: "{{ lb_user }}"
      password: "{{ lb_pass }}"
      loginProviderName: "{{ f5_auth_provider }}"
    validate_certs: "{{ f5_validate_certs }}"
    status_code: 200
    timeout: 30
  register: _f5_login_response
  delegate_to: localhost
  no_log: true

- name: "Extender timeout del token a {{ f5_token_timeout }} segundos"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ f5_api_port }}/mgmt/shared/authz/tokens/{{ _f5_login_response.json.token.token }}"
    method: PATCH
    body_format: json
    body:
      timeout: "{{ f5_token_timeout }}"
    headers:
      X-F5-Auth-Token: "{{ _f5_login_response.json.token.token }}"
    validate_certs: "{{ f5_validate_certs }}"
    status_code: 200
    timeout: 30
  delegate_to: localhost
  no_log: true

- name: "Almacenar token de sesion"
  ansible.builtin.set_fact:
    f5_api_token: "{{ _f5_login_response.json.token.token }}"
  no_log: true
