---
# Consulta el total de nodos LTM y cuántos están UP via iControlREST.
# Equivalente a:
#   tmsh list ltm node | grep address | wc -l
#   tmsh list ltm node | grep state | grep up | wc -l
#
# Una sola llamada API extrae ambos valores.
#
# Requiere:
#   - f5_api_token      : token activo (obtenido por f5_get_token.yml)
#   - ansible_host      : IP o FQDN del BIG-IP
#   - f5_api_port       : puerto HTTPS (default 443)
#   - f5_validate_certs : validación TLS (default false)
#
# Publica:
#   - nodes           : número total de nodos LTM configurados
#   - nodes_up        : número de nodos en estado up
#   - nodes_down      : número de nodos en estado down (monitor)
#   - nodes_user_down : número de nodos en estado user-down (deshabilitados manualmente)

- name: "Consultar nodos LTM de {{ inventory_hostname }}"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ f5_api_port }}/mgmt/tm/ltm/node"
    method: GET
    headers:
      X-F5-Auth-Token: "{{ f5_api_token }}"
    validate_certs: "{{ f5_validate_certs }}"
    status_code: 200
    timeout: 30
  delegate_to: localhost
  register: _nodes_raw

- name: "Publicar conteo de nodos por estado"
  ansible.builtin.set_fact:
    nodes: "{{ _nodes_raw.json['items'] | default([]) | length }}"
    nodes_up: "{{ _nodes_raw.json['items'] | default([]) | selectattr('state', 'equalto', 'up') | list | length }}"
    nodes_down: "{{ _nodes_raw.json['items'] | default([]) | selectattr('state', 'equalto', 'down') | list | length }}"
    nodes_user_down: "{{ _nodes_raw.json['items'] | default([]) | selectattr('state', 'equalto', 'user-down') | list | length }}"
