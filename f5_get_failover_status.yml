---
# Consulta el estado de failover del BIG-IP via iControlREST.
# Equivalente a: tmsh show sys failover
#
# Requiere:
#   - f5_api_token      : token activo (obtenido por f5_get_token.yml)
#   - ansible_host      : IP o FQDN del BIG-IP
#   - f5_api_port       : puerto HTTPS (default 443)
#   - f5_validate_certs : validación TLS (default false)
#
# Publica:
#   - failover : "active" | "standby" | "forced-offline" | "unknown"

- name: "Consultar estado de failover de {{ inventory_hostname }}"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ f5_api_port }}/mgmt/tm/sys/failover"
    method: GET
    headers:
      X-F5-Auth-Token: "{{ f5_api_token }}"
    validate_certs: "{{ f5_validate_certs }}"
    status_code: 200
    timeout: 30
  delegate_to: localhost
  register: _failover_raw

- name: "Publicar estado de failover"
  ansible.builtin.set_fact:
    failover: >-
      {{
        _failover_raw.json | default({})
        | json_query('apiRawValues.apiAnonymous') | default('', true)
        | regex_replace('(?i)^\s*Failover\s*', '')
        | trim
      }}

- name: "Failover fallback si vacío"
  ansible.builtin.set_fact:
    failover: "unknown"
  when: not failover or failover | length == 0
