---
# Revoca el token iControlREST para cerrar la sesión de forma segura.
# Llamado desde el bloque always: del playbook para garantizar ejecución
# incluso si la tarea falla a mitad.

- name: "Revocar token iControlREST para {{ inventory_hostname }}"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ f5_api_port }}/mgmt/shared/authz/tokens/{{ f5_api_token }}"
    method: DELETE
    headers:
      X-F5-Auth-Token: "{{ f5_api_token }}"
    validate_certs: "{{ f5_validate_certs }}"
    status_code: 200
    timeout: 30
  delegate_to: localhost
  no_log: true
  when: f5_api_token is defined
