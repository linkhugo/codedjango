---
# Consulta el estado de todos los Virtual Servers via iControlREST.
# Equivalente a: tmsh show ltm virtual | grep Availability
#
# Una sola llamada API extrae total, available, offline y unknown.
#
# Requiere:
#   - f5_api_token      : token activo (obtenido por f5_get_token.yml)
#   - ansible_host      : IP o FQDN del BIG-IP
#   - f5_api_port       : puerto HTTPS (default 443)
#   - f5_validate_certs : validación TLS (default false)
#
# Publica:
#   - vip           : total de Virtual Servers
#   - vip_available : Virtual Servers en estado available
#   - vip_offline   : Virtual Servers en estado offline
#   - vip_unknown   : Virtual Servers en estado unknown

- name: "Consultar estado de Virtual Servers de {{ inventory_hostname }}"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ f5_api_port }}/mgmt/tm/ltm/virtual/stats"
    method: GET
    headers:
      X-F5-Auth-Token: "{{ f5_api_token }}"
    validate_certs: "{{ f5_validate_certs }}"
    status_code: 200
    timeout: 30
  delegate_to: localhost
  register: _vip_raw

- name: "Publicar conteo de Virtual Servers por estado"
  ansible.builtin.set_fact:
    vip: >-
      {{ _vip_raw.json.entries | default({}) | length }}
    vip_available: >-
      {{
        _vip_raw.json.entries | default({})
        | json_query('*.nestedStats.entries."status.availabilityState".description')
        | default([]) | select('equalto', 'available') | list | length
      }}
    vip_offline: >-
      {{
        _vip_raw.json.entries | default({})
        | json_query('*.nestedStats.entries."status.availabilityState".description')
        | default([]) | select('equalto', 'offline') | list | length
      }}
    vip_unknown: >-
      {{
        _vip_raw.json.entries | default({})
        | json_query('*.nestedStats.entries."status.availabilityState".description')
        | default([]) | select('equalto', 'unknown') | list | length
      }}
