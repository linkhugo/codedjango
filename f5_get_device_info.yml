---
# Obtiene el uptime del BIG-IP via iControlREST (bash).
#
# Requiere:
#   - f5_api_token      : token activo (obtenido por f5_get_token.yml)
#   - ansible_host      : IP o FQDN del BIG-IP
#   - f5_api_port       : puerto HTTPS (default 443)
#   - f5_validate_certs : validación TLS (default false)
#
# Publica:
#   - dias : uptime del equipo en días (entero)

- name: "Obtener uptime via bash"
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:{{ f5_api_port }}/mgmt/tm/util/bash"
    method: POST
    headers:
      X-F5-Auth-Token: "{{ f5_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      command: "run"
      utilCmdArgs: "-c 'uptime'"
    validate_certs: "{{ f5_validate_certs }}"
    status_code: 200
    timeout: 30
  delegate_to: localhost
  register: _uptime_raw

- name: "Publicar uptime en días"
  ansible.builtin.set_fact:
    dias: "{{ _uptime_raw.json.commandResult | default('') | regex_search('(\\d+) day', '\\1') | default(['0']) | first }}"
