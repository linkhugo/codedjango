---
# Envía el registro de healthcheck F5 a la API REST de Django.
# Se invoca desde healthcheck_f5.yml cuando lb_api_push == true.
#
# Requiere (vars del playbook):
#   lb_api_url  → URL base de Django, ej. http://10.0.0.1:8000
#   lb_api_user → usuario con permisos en la API (vault)
#   lb_api_pass → contraseña (vault)
#
# Requiere (facts publicados por tareas anteriores):
#   dias, failover, failsafe, sync, logs_ltm, cpu_data_use, cpu_plane_use,
#   cpu_analysis_use, con_top, mem_tmm_total, mem_tmm_used, nodes, nodes_up,
#   nodes_down, nodes_user_down, vip, vip_available, vip_offline, vip_unknown,
#   company, ultima_carpeta, Backup, backup_path

- name: "Enviar healthcheck de {{ inventory_hostname }} a la API REST"
  ansible.builtin.uri:
    url: "{{ lb_api_url }}/api/v1/health/f5/"
    method: POST
    body_format: json
    body:
      fqdn:             "{{ inventory_hostname }}"
      uptime:           "{{ dias | default(0) | int }}"
      failover:         "{{ failover | default(None) }}"
      failsafe:         "{{ failsafe | default(None) }}"
      sync:             "{{ sync | default(None) }}"
      ltm_logs:         "{{ logs_ltm.stdout | default(0) | int }}"
      cpu_usage:        "{{ cpu_data_use.stdout | default('') | int(0) }}"
      cpu_plane_use:    "{{ cpu_plane_use.stdout | default('') | int(0) }}"
      cpu_analysis_use: "{{ cpu_analysis_use.stdout | default('') | int(0) }}"
      top_connections:  "{{ con_top | default(0) | int }}"
      tmm_memory:       "{{ mem_tmm_total | default(0) }}"
      tmm_memory_used:  "{{ mem_tmm_used | default(0) }}"
      nodes:            "{{ nodes | default(0) | int }}"
      nodes_up:         "{{ nodes_up | default(0) | int }}"
      nodes_down:       "{{ nodes_down | default(0) | int }}"
      nodes_user_down:  "{{ nodes_user_down | default(0) | int }}"
      vips:             "{{ vip | default(0) | int }}"
      vips_up:          "{{ vip_available | default(0) | int }}"
      vips_offline:     "{{ vip_offline | default(0) | int }}"
      vips_unknown:     "{{ vip_unknown | default(0) | int }}"
      fecha:            "{{ lookup('pipe', 'TZ=America/Mexico_City date +%Y-%m-%d') }}"
      company:          "{{ company | default(None) }}"
      last_folder:      "{{ ultima_carpeta.stdout | default(None) }}"
      file_backup:      "{{ Backup | default(false) | string }}"
      backup_path:      "{{ backup_path | default(None) }}"
    headers:
      Authorization: "Bearer {{ _lb_api_token }}"
    status_code: [200, 201]
    timeout: 30
  delegate_to: localhost
  ignore_errors: true
