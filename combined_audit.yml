---
# Playbook: combined_audit.yml
#
# Ejecuta los perfiles hardening_v_1_5 y network_services_std_values
# en un único host y genera un CSV combinado por dispositivo.
#
# Uso:
#   ansible-playbook combined_audit.yml --limit test01 --ask-vault-pass
#   ansible-playbook combined_audit.yml --limit test01 -e hardening_output_dir=/tmp/reportes --ask-vault-pass

- hosts: f5_devices
  gather_facts: no

  tasks:

    - name: "Inicializar acumulador combinado y fecha"
      ansible.builtin.set_fact:
        resultados_combined: []
        fecha_actual: "{{ now(utc=True, fmt='%Y-%m-%d') }}"

    - name: "Ejecutar perfil hardening_v_1_5"
      ansible.builtin.include_role:
        name: lb_profiles
      vars:
        profile_name: hardening_v_1_5
        lb_generate_csv: false

    - name: "Acumular resultados de hardening_v_1_5"
      ansible.builtin.set_fact:
        resultados_combined: "{{ resultados_combined + resultados }}"

    - name: "Ejecutar perfil network_services_std_values"
      ansible.builtin.include_role:
        name: lb_profiles
      vars:
        profile_name: network_services_std_values
        lb_generate_csv: false

    - name: "Acumular resultados de network_services_std_values"
      ansible.builtin.set_fact:
        resultados_combined: "{{ resultados_combined + resultados }}"

    - name: "Crear directorio de salida en el controller"
      ansible.builtin.file:
        path: "{{ hardening_output_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: "Generar CSV combinado"
      ansible.builtin.copy:
        dest: "{{ hardening_output_dir }}/hardening_std_values_{{ inventory_hostname }}.csv"
        content: |
          Device,Code,Descripcion,Valor_Obtenido,Valor_Recomendado,Resultado,Comando_Para_Validar,fecha
          {% for r in resultados_combined %}
          {{ r.Device }}, {{ r.Code }}, {{ r.Descripcion }},{{ r.Valor_Obtenido | replace(',', ';')}},{{ r.Valor_Recomendado | replace(',',';') }},{{ r.Resultado }},{{ r.Comando_Para_Validar }},{{ r.fecha }}
          {% endfor %}
      delegate_to: localhost

    - name: "Enviar resultados combinados a la API Django"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/lb_engine_core/tasks/push_to_api.yml"
      vars:
        resultados: "{{ resultados_combined }}"
      when: lb_api_push | default(false)
